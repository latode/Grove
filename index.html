<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0E1018">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Grove">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Grove</title>
<style>
:root{
  --bg0:#0E1018; --bg1:#161A2B;
  --surface:rgba(34,38,58,.62); --raised:rgba(255,255,255,.055); --line:rgba(120,130,170,.18);
  --text:#F2F1EC; --sub:#AEB1C6; --faint:#71748A;
  --sage:#5FE0B0; --amber:#FFC661; --rose:#FF8FB0; --indigo:#9AA9FF; --sky:#56C8E8; --lilac:#C89BFF; --danger:#FF7E66;
}
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
html,body{margin:0;padding:0;min-height:100vh;color:var(--text);
  font-family:-apple-system,system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
body{background:radial-gradient(125% 70% at 50% 0%, #1F2540 0%, rgba(18,21,33,.55) 45%, #0E1018 82%), #0E1018;}
.mono{font-family:ui-monospace,"SF Mono",Menlo,monospace}
.wrap{max-width:460px;margin:0 auto;padding:24px 16px calc(100px + env(safe-area-inset-bottom));}
.hd{margin-bottom:20px}
.statshd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.h1{font-size:30px;font-weight:650;letter-spacing:-.6px;background:linear-gradient(100deg,#F2F1EC,#C9CFF0);
  -webkit-background-clip:text;background-clip:text;color:transparent;display:inline-block}
.h2{font-size:20px;font-weight:600}
.subc{color:var(--sub)} .faintc{color:var(--faint)} .sagec{color:var(--sage)}
.amberc{color:var(--amber)} .indigoc{color:var(--indigo)}
.sm{font-size:14px} .xs{font-size:11px} .mt2{margin-top:2px} .mt4{margin-top:4px}
.mt8{margin-top:8px} .mb12{margin-bottom:12px} .nm{margin-top:2px} .nomb{margin-bottom:0}
.eyebrow{color:var(--faint);font-size:11px;letter-spacing:2.5px;text-transform:uppercase;margin:0 2px 12px}
.taphd{display:flex;align-items:center;gap:8px;cursor:pointer}
.chev{display:inline-flex;transition:transform .2s}
.stack{display:grid;gap:13px;margin-bottom:24px}
.stacksm{display:grid;gap:8px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:22px;padding:18px;margin-bottom:24px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  box-shadow:0 8px 30px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.045)}
.stack .card,.stacksm .card{margin-bottom:0}
.card.pad12{padding:13px}
.itemhead{display:flex;justify-content:space-between;align-items:center}
.itemname{font-size:17px;font-weight:560}
.pips{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.pip{width:15px;height:15px;border-radius:99px;border:1.5px solid var(--sage);background:transparent}
.bar{height:9px;border-radius:99px;background:rgba(255,255,255,.06);margin-top:13px;overflow:hidden}
.barfill{height:100%;border-radius:99px;transition:width .35s}
.ctrls{display:flex;gap:9px;margin-top:14px;flex-wrap:wrap}
.btn{background:var(--raised);border:1px solid var(--line);color:var(--text);border-radius:13px;
  padding:10px 13px;font-size:14px;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:6px;
  transition:background .15s,transform .1s}
.btn:active{transform:scale(.97)}
.btn svg{display:block}
.btn.solid{background:linear-gradient(180deg,#5FE0B0,#39C194);color:#08231A;border:none;font-weight:600;
  box-shadow:0 4px 16px rgba(95,224,176,.32)}
.btn.quiet{background:transparent;color:var(--sub)}
.btn.danger{background:var(--danger);color:#2A130D;border:none}
.btn.danger-outline{background:transparent;color:var(--danger);border-color:var(--danger)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--raised);border:1px solid var(--line);
  border-radius:99px;padding:4px 9px;color:var(--sub);font-family:ui-monospace,Menlo,monospace;font-size:11px;cursor:pointer}
.hint{color:var(--faint);font-size:12px;margin-top:11px;line-height:1.5}
.link{color:var(--sage);cursor:pointer}
.introw{display:flex;align-items:center;gap:11px;padding:7px 0;cursor:pointer}
.introw2{display:flex;align-items:center;gap:10px;padding:3px 0}
.grow{flex:1}
.cbox{width:21px;height:21px;border-radius:7px;border:1.5px solid var(--line);display:grid;place-items:center;flex:none;cursor:pointer;transition:background .15s}
.cbox.sm{width:18px;height:18px;border-radius:6px}
.cbox.on{background:var(--sage);border-color:var(--sage);color:#08231A}
.done{color:var(--faint);text-decoration:line-through}
.pts{margin-left:auto}
.tagmini{font-size:10px;color:var(--faint);border:1px solid var(--line);border-radius:6px;padding:1px 5px}
.inrow{display:flex;gap:8px;align-items:center}
.input{flex:1;background:var(--raised);border:1px solid var(--line);border-radius:13px;padding:11px 13px;
  color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color .15s}
.input:focus{border-color:var(--indigo)}
.input.full{width:100%;flex:none}
.ta{width:100%;background:var(--raised);border:1px solid var(--line);border-radius:13px;padding:11px 13px;
  color:var(--text);font-family:inherit;font-size:14px;outline:none;resize:vertical;transition:border-color .15s}
.ta:focus{border-color:var(--indigo)}
.naprow{display:flex;justify-content:space-between;align-items:center}
.daynav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.daylbl{text-align:center;font-size:15px}
.iconbtn{background:var(--raised);border:1px solid var(--line);border-radius:11px;color:var(--text);cursor:pointer;
  padding:9px;display:inline-flex;align-items:center}
.seg{display:flex;gap:6px;margin-bottom:11px}
.segbtn{flex:1;padding:8px 0;border-radius:11px;font-size:13px;font-family:inherit;cursor:pointer;
  background:transparent;color:var(--faint);border:1px solid transparent}
.segbtn.on{background:var(--raised);color:var(--text);border-color:var(--line)}
.stepper{display:flex;align-items:center;gap:4px;background:var(--raised);border:1px solid var(--line);border-radius:13px;padding:0 8px}
.stepper button{background:none;border:none;color:var(--sub);cursor:pointer;font-size:18px;line-height:1;padding:7px 2px;font-family:ui-monospace,Menlo,monospace}
.stepper .mono{min-width:26px;text-align:center;font-size:13px}
.enrow{display:flex;gap:10px}
.enbtn{flex:1;height:44px;border-radius:13px;cursor:pointer;font-family:ui-monospace,Menlo,monospace;font-size:14px;
  border:1px solid var(--line);background:transparent;color:var(--faint);transition:all .15s}
.enbtn.on{border-color:var(--indigo);background:var(--indigo);color:#15182A;box-shadow:0 0 14px rgba(154,169,255,.4)}
.enlbl{display:flex;justify-content:space-between;color:var(--faint);font-size:11px;margin-top:6px}
.forest{position:relative;overflow:hidden;border-radius:18px;border:1px solid var(--line);padding:24px 14px 0;
  background:linear-gradient(180deg,#26345C 0%,#1B2138 70%,#171B2C 100%)}
.forest:before{content:"";position:absolute;top:16px;right:24px;width:30px;height:30px;border-radius:99px;
  background:radial-gradient(circle,#FFE6A8,#FFC661);box-shadow:0 0 28px rgba(255,198,97,.55);z-index:0}
.forest:after{content:"";position:absolute;left:0;right:0;bottom:0;height:24px;
  background:linear-gradient(180deg,#1B3A2E,#14241D);z-index:0}
.forestrow{display:flex;flex-wrap:wrap;align-items:flex-end;gap:14px 8px;position:relative;z-index:1;padding-bottom:18px}
.chart{width:100%;height:auto;display:block}
.actrow{display:flex;align-items:center;gap:10px}
.adot{width:9px;height:9px;border-radius:99px;flex:none}
.streakw{width:64px;text-align:right;font-size:12px}
.pointshd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.big{font-size:22px}
.itemedit{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:11px}
.sel{background:var(--raised);border:1px solid var(--line);border-radius:11px;color:var(--text);font-family:inherit;font-size:13px;padding:8px 9px;outline:none}
.acc{display:flex;gap:5px}
.accbtn{width:21px;height:21px;border-radius:99px;border:2px solid transparent;cursor:pointer;padding:0}
.accbtn.on{border-color:var(--text)}
.nameinput{background:transparent;border:none;color:var(--text);font-family:inherit;font-size:15px;outline:none}
.lim{min-width:34px;text-align:center;font-size:13px}
input.lim{background:transparent;border:none;color:var(--text);font-family:ui-monospace,Menlo,monospace;width:38px;outline:none}
.numin{background:var(--raised);border:1px solid var(--line);border-radius:9px;color:var(--text);font-family:inherit;
  font-size:13px;width:50px;text-align:center;padding:6px 4px;outline:none}
.numin:focus{border-color:var(--indigo)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.resistrow{display:flex;align-items:center;gap:10px;padding:9px 0}
.resistrow+.resistrow{border-top:1px solid var(--line)}
.yn{display:flex;gap:6px;margin-left:auto}
.ynbtn{padding:7px 15px;border-radius:11px;border:1px solid var(--line);background:transparent;color:var(--sub);
  font-family:inherit;font-size:13px;cursor:pointer;transition:all .15s}
.ynbtn.yes.on{background:var(--sage);color:#08231A;border-color:var(--sage);font-weight:600}
.ynbtn.no.on{background:var(--danger);color:#2A130D;border-color:var(--danger);font-weight:600}
.coins{display:flex;flex-wrap:wrap;gap:18px 16px}
.coin{width:78px;text-align:center}
.coindisc{width:62px;height:62px;border-radius:99px;margin:0 auto;display:grid;place-items:center;
  background:radial-gradient(circle at 36% 30%, #FFE9A8, #F5B638 68%, #C98A1E);
  color:#5A3D08;font-weight:700;font-size:22px;font-family:ui-monospace,Menlo,monospace;
  box-shadow:0 4px 14px rgba(245,182,56,.3), inset 0 1px 2px rgba(255,255,255,.55)}
.coinname{font-size:12px;margin-top:9px;color:var(--sub);line-height:1.3}
.coinbest{font-size:11px;color:var(--faint);margin-top:2px}
.footer{text-align:center;color:var(--faint);font-size:11px;margin-top:24px;line-height:1.6}
#nav{position:fixed;left:0;right:0;bottom:0;background:rgba(20,23,36,.82);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:9px 0 calc(11px + env(safe-area-inset-bottom));z-index:20}
.navbtn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--faint);font-family:inherit;font-size:10px;transition:color .15s}
.navbtn.active{color:var(--sage)}
#timerbar{position:fixed;left:0;right:0;bottom:calc(78px + env(safe-area-inset-bottom));display:none;justify-content:center;pointer-events:none;z-index:25}
.timercard{pointer-events:auto;background:var(--surface);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid var(--line);border-radius:16px;padding:9px 13px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 30px rgba(0,0,0,.45)}
.tdot{width:10px;height:10px;border-radius:99px}
.tname{font-size:13px;color:var(--sub)}
.tclock{font-family:ui-monospace,Menlo,monospace;font-size:18px}
.ticon{background:none;border:none;color:var(--sage);cursor:pointer;display:flex;padding:0}
.ticon.faint{color:var(--faint)}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div id="timerbar"></div>
<nav id="nav"></nav>
<script>
"use strict";

/* ---------- helpers ---------- */
const $ = (id) => document.getElementById(id);
const pad = (n) => String(n).padStart(2, "0");
const dstr = (d) => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const today = () => dstr(new Date());
const addDays = (s, n) => { const [y,m,da]=s.split("-").map(Number); const d=new Date(y,m-1,da); d.setDate(d.getDate()+n); return dstr(d); };
const prettyDay = (s) => { const [y,m,da]=s.split("-").map(Number); return new Date(y,m-1,da).toLocaleDateString(undefined,{weekday:"long",day:"numeric",month:"long"}); };
const shortDay = (s) => { const [y,m,da]=s.split("-").map(Number); return new Date(y,m-1,da).toLocaleDateString(undefined,{weekday:"short",day:"numeric",month:"short"}); };
const uid = () => Math.random().toString(36).slice(2,9);
const clone = (o) => JSON.parse(JSON.stringify(o));
const esc = (s) => String(s==null?"":s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

const ACC = { sage:"#5FE0B0", indigo:"#9AA9FF", amber:"#FFC661", rose:"#FF8FB0", sky:"#56C8E8", lilac:"#C89BFF" };
const accOf = (a) => ACC[a] || ACC.sage;

/* ---------- icons ---------- */
function icon(name, sz=18){
  const p = {
    home:'<path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/>',
    cal:'<rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/><path d="M9 14l2 2 4-4"/>',
    book:'<path d="M4 4h13a2 2 0 0 1 2 2v14H6a2 2 0 0 1-2-2z"/><path d="M14 4v14"/>',
    chart:'<path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/>',
    more:'<circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/>',
    plus:'<path d="M12 5v14M5 12h14"/>',
    check:'<path d="M5 12l5 5 9-10"/>',
    x:'<path d="M6 6l12 12M18 6L6 18"/>',
    play:'<path d="M7 5l12 7-12 7z" fill="currentColor" stroke="none"/>',
    trash:'<path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/>',
    chevL:'<path d="M15 5l-7 7 7 7"/>',
    chevR:'<path d="M9 5l7 7-7 7"/>',
    coffee:'<path d="M4 9h13v4a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5z"/><path d="M17 10h2a2 2 0 0 1 0 4h-2"/>',
    download:'<path d="M12 4v11M7 11l5 5 5-5"/><path d="M5 20h14"/>',
  }[name] || "";
  return `<svg width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
}

/* ---------- state ---------- */
const KEY = "grove_v1";
const DEFAULT_MENU = [
  { id:"reading", name:"Reading", type:"minutes", limit:60, session:null, accent:"sage" },
  { id:"piano", name:"Piano", type:"times", limit:2, session:15, accent:"indigo" },
  { id:"klaus", name:"Klaus training", type:"times", limit:2, session:null, accent:"sky" },
  { id:"reddit", name:"Reddit / phone", type:"minutes", limit:30, session:30, accent:"amber" },
];
const BLANK = { menu:DEFAULT_MENU, logs:[], intentions:{}, inbox:[], journal:{}, naps:[], resists:[], resistLogs:{} };
function load(){ try{ const r=localStorage.getItem(KEY); if(r) return Object.assign(clone(BLANK), JSON.parse(r)); }catch(e){} return clone(BLANK); }
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }
let state = load();

const now = new Date();
const ui = { tab:"today", todayDay:today(), planDay:addDays(today(),1), planLane:"forSure", planPoints:1,
  captureText:"", planText:"", statsY:now.getFullYear(), statsM:now.getMonth(), timer:null, _tick:null, confirmReset:false };

/* ---------- logging ---------- */
const logsFor = (id, ds) => state.logs.filter(l => l.itemId===id && l.date===ds);
const usedOn = (it, ds) => it.type==="times" ? logsFor(it.id,ds).length : logsFor(it.id,ds).reduce((a,l)=>a+(l.minutes||0),0);
const viewedDay = () => ui.todayDay || today();

/* ---------- resists (daily yes/no) ---------- */
const resistAns = (id, ds) => state.resistLogs[ds] ? state.resistLogs[ds][id] : undefined;
const yesStreak = (id) => {
  if(resistAns(id, today())===false) return 0;
  let c=0, cur = resistAns(id, today())===true ? today() : addDays(today(),-1);
  while(resistAns(id, cur)===true){ c++; cur=addDays(cur,-1); }
  return c;
};
const longestClean = (id) => {
  const dates = Object.keys(state.resistLogs).filter(d=>state.resistLogs[d] && id in state.resistLogs[d]);
  if(!dates.length) return 0;
  let cur = dates.sort()[0], best=0, run=0;
  while(cur <= today()){ if(resistAns(id,cur)===false){ run=0; } else { run++; if(run>best) best=run; } cur=addDays(cur,1); }
  return best;
};

/* ---------- forest + charts ---------- */
const stageOf = (sc) => sc===0?0 : sc<=2?1 : sc<=4?2 : sc<=7?3 : 4;
function treeSVG(stage, seed, isToday){
  const r = (n) => { const x=Math.sin((seed+1)*(n+7)*12.9898)*43758.5453; return x-Math.floor(x); };
  const GREENS = ["#2F8F66","#2E9E6E","#34A05C","#3FA862","#2E9088"];
  const HI     = ["#54C892","#5FD89E","#5CC76B","#74CF79","#46C2C2"];
  const g = GREENS[Math.floor(r(2)*GREENS.length)], h = HI[Math.floor(r(3)*HI.length)];
  let kind = ["lush","pine","lush","bush","pine","lush"][Math.floor(r(5)*6)];
  if(stage===0) kind="lush";
  let W, H, s="";
  if(kind==="pine"){
    H=Math.round([26,46,62,80,98][stage]*(0.9+r(1)*0.2)); W=Math.round(H*0.66);
    const cx=W/2, tw=Math.max(2.5,W*0.12), th=H*0.16, ty=H-th;
    s+=`<rect x="${cx-tw/2}" y="${ty}" width="${tw}" height="${th}" rx="${tw/2}" fill="#6E4A2F"/>`;
    const tiers=[2,2,3,3,4][stage], top=H*0.04, span=ty-top;
    for(let i=0;i<tiers;i++){ const yTop=top+span*(i/tiers), yBot=top+span*((i+1.25)/tiers), hw=W*0.5*(0.42+0.58*((i+1)/tiers));
      s+=`<path d="M${cx} ${yTop} L${cx+hw} ${yBot} L${cx-hw} ${yBot} Z" fill="${g}"/>`;
      s+=`<path d="M${cx} ${yTop} L${cx-hw} ${yBot} L${cx-hw*0.25} ${yBot} Z" fill="${h}" opacity="0.8"/>`; }
  } else if(kind==="bush"){
    H=Math.round([22,38,50,64,76][stage]*(0.9+r(1)*0.2)); W=Math.round(H*1.0);
    const base=H*0.92, n=[2,3,3,4,5][stage];
    for(let i=0;i<n;i++){ const bx=W*0.2+(W*0.6)*(i/Math.max(1,n-1)), rr=H*(0.28+r(i+3)*0.16);
      s+=`<circle cx="${bx}" cy="${base-rr*0.5}" r="${rr}" fill="${g}"/>`; }
    s+=`<circle cx="${W*0.4}" cy="${base-H*0.4}" r="${H*0.22}" fill="${h}" opacity="0.85"/>`;
  } else {
    H=Math.round([26,46,62,80,98][stage]*(0.9+r(1)*0.2)); W=Math.round(H*0.82);
    const cx=W/2, tw=Math.max(3,W*0.11), th=stage===0?H*0.5:H*0.34, ty=H-th;
    s+=`<path d="M${cx-tw/2} ${H} Q${cx-tw*0.6} ${ty+th*0.4} ${cx-tw*0.35} ${ty} L${cx+tw*0.35} ${ty} Q${cx+tw*0.6} ${ty+th*0.4} ${cx+tw/2} ${H} Z" fill="#6E4A2F"/>`;
    if(stage===0){
      s+=`<ellipse cx="${cx-W*0.14}" cy="${ty}" rx="${W*0.2}" ry="${W*0.1}" fill="${g}" transform="rotate(-30 ${cx-W*0.14} ${ty})"/>`;
      s+=`<ellipse cx="${cx+W*0.14}" cy="${ty-2}" rx="${W*0.2}" ry="${W*0.1}" fill="${h}" transform="rotate(30 ${cx+W*0.14} ${ty-2})"/>`;
    } else {
      const cy=ty-H*0.18, R=W*0.42;
      s+=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="${g}"/>`;
      if(stage>=2) s+=`<circle cx="${cx-W*0.28}" cy="${cy+H*0.08}" r="${R*0.7}" fill="${g}"/><circle cx="${cx+W*0.28}" cy="${cy+H*0.08}" r="${R*0.7}" fill="${g}"/>`;
      if(stage>=3) s+=`<circle cx="${cx}" cy="${cy-H*0.22}" r="${R*0.72}" fill="${g}"/>`;
      if(stage>=4) s+=`<circle cx="${cx}" cy="${cy-H*0.4}" r="${R*0.55}" fill="${g}"/>`;
      s+=`<circle cx="${cx-W*0.16}" cy="${cy-H*0.1}" r="${R*0.5}" fill="${h}" opacity="0.85"/>`;
      if(stage>=3) s+=`<circle cx="${cx-W*0.08}" cy="${cy-H*0.28}" r="${R*0.34}" fill="${h}" opacity="0.85"/>`;
    }
  }
  if(isToday) s+=`<circle cx="${W/2}" cy="${H-2}" r="3.2" fill="${ACC.amber}"/>`;
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="overflow:visible;opacity:${stage===0?0.9:1}">${s}</svg>`;
}
function lineSVG(d){
  const W=300,H=120,p=18;
  const xs=i=> d.length===1 ? W/2 : p+i*(W-2*p)/(d.length-1);
  const ys=v=> H-p-((v-1)/4)*(H-2*p);
  const pts=d.map((x,i)=>`${xs(i).toFixed(1)},${ys(x.e).toFixed(1)}`).join(" ");
  const dots=d.map((x,i)=>`<circle cx="${xs(i).toFixed(1)}" cy="${ys(x.e).toFixed(1)}" r="3" fill="var(--indigo)"/>`).join("");
  return `<svg viewBox="0 0 ${W} ${H}" class="chart"><polyline points="${pts}" fill="none" stroke="var(--indigo)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>${dots}</svg>`;
}
function barSVG(d){
  const W=300,H=110,p=14; const max=Math.max(1,...d.map(x=>x.p)); const gap=(W-2*p)/d.length; const bw=gap*0.62;
  const bars=d.map((x,i)=>{ const bh=(x.p/max)*(H-2*p); const bx=p+i*gap+(gap-bw)/2;
    return `<rect x="${bx.toFixed(1)}" y="${(H-p-bh).toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="3" fill="var(--sage)"/>`
      + (x.p?`<text x="${(bx+bw/2).toFixed(1)}" y="${(H-p-bh-3).toFixed(1)}" text-anchor="middle" font-size="8" fill="var(--faint)">${x.p}</text>`:"");
  }).join("");
  return `<svg viewBox="0 0 ${W} ${H}" class="chart">${bars}</svg>`;
}

  const menu = state.menu.map(it=>{

    const entries=state.logs.filter(l=>l.itemId===it.id && l.date===day);
    let viz;
    if(it.type==="times"){
      const n=Math.max(it.limit,used); let pips="";

    }

function Stats(){
  const y=ui.statsY, m=ui.statsM, prefix=`${y}-${pad(m+1)}`;
  const label=new Date(y,m,1).toLocaleDateString(undefined,{month:"long",year:"numeric"});
  const dim=new Date(y,m+1,0).getDate();
  const growsTree=id=>{ const it=state.menu.find(m=>m.id===id); return !it || it.growsTree!==false; };
  const dayScore=ds=>state.logs.filter(l=>l.date===ds&&growsTree(l.itemId)).length +
    ((state.intentions[ds]?.forSure||[]).concat(state.intentions[ds]?.capture||[]).filter(x=>x.done).length);
  let trees=""; for(let i=1;i<=dim;i++){ const ds=`${prefix}-${pad(i)}`; trees+=treeSVG(stageOf(dayScore(ds)),i,ds===today()); }
  const streak=id=>{ let c=0; let cur=state.logs.some(l=>l.itemId===id&&l.date===today())?today():addDays(today(),-1);
    while(state.logs.some(l=>l.itemId===id&&l.date===cur)){ c++; cur=addDays(cur,-1); } return c; };
  const mcount=id=>state.logs.filter(l=>l.itemId===id&&l.date.startsWith(prefix)).length;
  const acts=state.menu.map(it=>{ const st=streak(it.id);
    return `<div class="actrow"><span class="adot" style="background:${accOf(it.accent)}"></span>
      <span class="grow sm">${esc(it.name)}</span><span class="mono subc">${mcount(it.id)}×</span>
      <span class="mono ${st?"sagec":"faintc"} streakw">${st?st+"d streak":"—"}</span></div>`; }).join("");
  const ed=[]; for(let i=1;i<=dim;i++){ const ds=`${prefix}-${pad(i)}`; if(state.journal[ds]?.energy) ed.push({d:i,e:state.journal[ds].energy}); }
  const pdat=[]; for(let i=13;i>=0;i--){ const ds=addDays(today(),-i);
    const done=(state.intentions[ds]?.forSure||[]).concat(state.intentions[ds]?.capture||[]).filter(x=>x.done).reduce((a,x)=>a+(x.points||1),0);
    pdat.push({d:Number(ds.slice(-2)),p:done}); }
  const mpoints=Object.entries(state.intentions).filter(([d])=>d.startsWith(prefix))
    .reduce((a,[,v])=>a+(v.forSure||[]).concat(v.capture||[]).filter(x=>x.done).reduce((b,x)=>b+(x.points||1),0),0);
  return `
    <header class="statshd">
      <button class="iconbtn" onclick="App.statMonth(-1)">${icon("chevL",18)}</button>
      <div class="h2">${label}</div>
      <button class="iconbtn" onclick="App.statMonth(1)">${icon("chevR",18)}</button>
    </header>
    <div class="card"><div class="eyebrow">Your forest this month</div>
      <div class="forest"><div class="forestrow">${trees}</div></div>
      <div class="hint mt8">Each day is a tree. Busy days grow tall, quiet days stay saplings — and nothing ever dies.</div></div>
    <div class="card"><div class="eyebrow">Your menu this month</div><div class="stacksm">${acts}</div></div>
    <div class="card"><div class="eyebrow">Energy through the month</div>
      ${ed.length<2?`<div class="subc sm">A couple of journal nights and a line shows up here.</div>`:lineSVG(ed)}</div>
    <div class="card"><div class="pointshd"><div class="eyebrow nomb">Points finished</div>
      <span class="mono sagec big">${mpoints}</span></div>${barSVG(pdat)}
      <div class="hint mt4">Last 14 days. Watch this to learn your real daily capacity.</div></div>
    ${state.resists.length?`<div class="card"><div class="eyebrow">Holding the line</div>
      <div class="coins">${state.resists.map(rz=>{ const cur=yesStreak(rz.id), best=longestClean(rz.id);
        return `<div class="coin"><div class="coindisc">${cur}</div>
          <div class="coinname">${esc(rz.name)}</div><div class="coinbest">best ${best}d</div></div>`; }).join("")}</div>
      <div class="hint mt8">Each coin counts days in a row you've said yes. "Best" is your longest run without a slip.</div></div>`:""}`;
}

  renderNav(); renderTimer();
  if(ui.tab==="today"){ const c=$("capture"); if(c) c.value=ui.captureText||""; }
  if(ui.tab==="plan"){ const p=$("planinput"); if(p) p.value=ui.planText||""; }
}

/* ---------- App handlers ---------- */
const App = {
  go(t){ if(t==="today") ui.todayDay=today(); ui.tab=t; render(); window.scrollTo(0,0); },
  viewDay(d){ const nd=addDays(viewedDay(),d); if(nd>today()) return; ui.todayDay=nd; render(); },
  goToday(){ ui.todayDay=today(); render(); },
  bind(k,v){ ui[k]=v; },
  toggleMenu(){ state.menuCollapsed = (state.menuCollapsed===false); save(); render(); },
  logOne(id){ const it=state.menu.find(m=>m.id===id); state.logs.push({id:uid(),date:viewedDay(),itemId:id,minutes:it.session||0}); save(); render(); },
  addMin(id,min){ state.logs.push({id:uid(),date:viewedDay(),itemId:id,minutes:min}); save(); render(); },
  removeLog(id){ state.logs=state.logs.filter(l=>l.id!==id); save(); render(); },
  startTimer(id){
    const it=state.menu.find(m=>m.id===id); if(!it) return;
    const mins=it.session || (it.type==="minutes"?Math.min(it.limit,25):15);
    ui.timer={itemId:id,left:mins*60,total:mins*60};
    if(ui._tick) clearInterval(ui._tick);
    ui._tick=setInterval(()=>{ if(!ui.timer){ clearInterval(ui._tick); return; } ui.timer.left--; if(ui.timer.left<=0) App.finishTimer(); else renderTimer(); },1000);
    renderTimer();
  },
  finishTimer(){
    if(ui._tick) clearInterval(ui._tick);
    const t=ui.timer; ui.timer=null;
    if(!t){ renderTimer(); return; }
    const it=state.menu.find(m=>m.id===t.itemId);
    const mins=Math.round((t.total-t.left)/60) || Math.round(t.total/60);
    if(it){ if(it.type==="times") state.logs.push({id:uid(),date:viewedDay(),itemId:it.id,minutes:it.session||mins});
      else state.logs.push({id:uid(),date:viewedDay(),itemId:it.id,minutes:mins}); }
    save(); render();
  },
  cancelTimer(){ if(ui._tick) clearInterval(ui._tick); ui.timer=null; renderTimer(); },
  toggleInt(lane,id){ const day=state.intentions[viewedDay()]; if(!day) return; day[lane]=day[lane].map(x=>x.id===id?Object.assign({},x,{done:!x.done}):x); save(); render(); },
  addCapture(){ const t=(ui.captureText||"").trim(); if(!t) return; state.inbox.unshift({id:uid(),text:t,done:false,ts:Date.now()}); ui.captureText=""; save(); render(); },
  toggleInbox(id){ state.inbox=state.inbox.map(x=>x.id===id?Object.assign({},x,{done:!x.done}):x); save(); render(); },
  delInbox(id){ state.inbox=state.inbox.filter(x=>x.id!==id); save(); render(); },
  logNap(){ state.naps.unshift({id:uid(),date:viewedDay(),ts:Date.now(),before3:new Date().getHours()<15}); save(); render(); },
  planDay(d){ ui.planDay=addDays(ui.planDay,d); render(); },
  setLane(l){ ui.planLane=l; render(); },
  pts(d){ ui.planPoints=Math.max(1,ui.planPoints+d); render(); },
  addInt(){ const t=(ui.planText||"").trim(); if(!t) return; const day=ui.planDay;
    if(!state.intentions[day]) state.intentions[day]={forSure:[],capture:[]};
    state.intentions[day][ui.planLane].push({id:uid(),text:t,points:ui.planPoints,done:false});
    ui.planText=""; ui.planPoints=1; save(); render(); },
  remInt(l,id){ state.intentions[ui.planDay][l]=state.intentions[ui.planDay][l].filter(x=>x.id!==id); save(); render(); },
  pullLeftover(date,lane,id){ const src=state.intentions[date]; if(!src||!src[lane]) return;
    const item=src[lane].find(x=>x.id===id); if(!item) return;
    src[lane]=src[lane].filter(x=>x.id!==id);
    const day=ui.planDay, dl=ui.planLane; if(!state.intentions[day]) state.intentions[day]={forSure:[],capture:[]};
    state.intentions[day][dl].push({id:uid(),text:item.text,points:item.points,done:false});
    save(); render(); },
  delLeftover(date,lane,id){ const src=state.intentions[date]; if(!src||!src[lane]) return;
    src[lane]=src[lane].filter(x=>x.id!==id); save(); render(); },
  energy(n){ state.journal[today()]=Object.assign({energy:0,mood:"",did:"",felt:""},state.journal[today()],{energy:n,ts:Date.now()}); save(); render(); },
  setJournal(k,v){ state.journal[today()]=Object.assign({energy:0,mood:"",did:"",felt:""},state.journal[today()],{[k]:v,ts:Date.now()}); save(); },
  statMonth(d){ let m=ui.statsM+d, y=ui.statsY; if(m<0){m=11;y--;} if(m>11){m=0;y++;} ui.statsM=m; ui.statsY=y; render(); },
  editName(id,v){ const it=state.menu.find(m=>m.id===id); if(it){ it.name=v; save(); } },
  editType(id,v){ const it=state.menu.find(m=>m.id===id); if(it){ it.type=v; save(); render(); } },
  editLimit(id,d){ const it=state.menu.find(m=>m.id===id); if(it){ const step=it.type==="minutes"?5:1, min=it.type==="minutes"?0:1;
    it.limit=Math.max(min, Math.round((it.limit+d*step)/step)*step); save(); render(); } },
  setLimit(id,v){ const it=state.menu.find(m=>m.id===id); if(it){ let n=parseInt(v,10); if(isNaN(n)) return; it.limit=Math.max(it.type==="minutes"?0:1, n); save(); render(); } },
  editQuick(id,which,v){ const it=state.menu.find(m=>m.id===id); if(it){ let n=parseInt(v,10); if(isNaN(n)) n=0; it["quick"+which]=Math.max(0,n); save(); render(); } },
  editSession(id,v){ const it=state.menu.find(m=>m.id===id); if(it){ let n=parseInt(v,10); it.session=(isNaN(n)||n<=0)?null:n; save(); render(); } },
  editAccent(id,a){ const it=state.menu.find(m=>m.id===id); if(it){ it.accent=a; save(); render(); } },
  editGrows(id){ const it=state.menu.find(m=>m.id===id); if(it){ it.growsTree=it.growsTree===false; save(); render(); } },
  addItem(){ state.menu.push({id:uid(),name:"New thing",type:"times",limit:1,session:null,accent:"rose",growsTree:true}); save(); render(); },
  delItem(id){ state.menu=state.menu.filter(m=>m.id!==id); save(); render(); },
  setResist(id,val){ const ds=viewedDay(); if(!state.resistLogs[ds]) state.resistLogs[ds]={};
    if(state.resistLogs[ds][id]===val) delete state.resistLogs[ds][id]; else state.resistLogs[ds][id]=val;
    save(); render(); },
  addResist(){ state.resists.push({id:uid(),name:"New limit"}); save(); render(); },
  editResistName(id,v){ const it=state.resists.find(r=>r.id===id); if(it){ it.name=v; save(); } },
  delResist(id){ state.resists=state.resists.filter(r=>r.id!==id); save(); render(); },
  exportJSON(){ download("grove-data.json", JSON.stringify(state,null,2)); },
  exportCSV(){ const rows=[["date","item","minutes"]].concat(state.logs.map(l=>{ const m=state.menu.find(x=>x.id===l.itemId); return [l.date, m?m.name:l.itemId, l.minutes||0]; }));
    download("grove-logs.csv", rows.map(r=>r.join(",")).join("\n")); },
  askReset(){ ui.confirmReset=true; render(); },
  cancelReset(){ ui.confirmReset=false; render(); },
  doReset(){ state=clone(BLANK); save(); ui.confirmReset=false; render(); },
};
window.App = App;

function download(name,text){
  const blob=new Blob([text],{type:"text/plain"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}

/* ---------- boot ---------- */
render();
if("serviceWorker" in navigator){
  const hadController = !!navigator.serviceWorker.controller;
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
  let _reloading=false;
  navigator.serviceWorker.addEventListener("controllerchange",()=>{
    if(_reloading) return; _reloading=true;
    if(hadController) window.location.reload();
  });
}
</script>
</body>
</html>
